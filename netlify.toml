[build]
  base = "astro/"
  publish = "dist/"
  command = "npm run build"

[images]
  remote_images = ["https://images\\.pexels\\.com/.*"]

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[edge_functions]]
  path = "/get-location"
  function = "geo-detection"

[[headers]]
  for = "/*.html"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

# 将旧的 /en/* 链接 301 永久跳转到无前缀版本
[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301
  force = true

# 小语种用户访问根路径时根据浏览器语言自动跳转
[[redirects]]
  from = "/"
  to = "/ja"
  status = 302
  conditions = {Language = ["ja"]}

