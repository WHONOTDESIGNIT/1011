[build]
  base = "1011-main/astro/"
  publish = "dist/"
  command = "npm run build"
  ignore = "bash -lc 'if [ -z \"$CACHED_COMMIT_REF\" ] || [ -z \"$COMMIT_REF\" ]; then exit 1; fi; git diff --name-only \"$CACHED_COMMIT_REF\" \"$COMMIT_REF\" | grep -E \"^(1011-main/src/content/blog/|1011-main/astro/|netlify.toml)\" >/dev/null && exit 1 || exit 0'"

[build.environment]
  NODE_VERSION = "20"

[images]
  remote_images = ["https://images\\.pexels\\.com/.*"]

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

# /en/* 301 跳转到无前缀版本（兼容旧链接）
[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301
  force = true

# SSR fallback（不加 force，现有静态文件由 CDN 直接提供）
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200
